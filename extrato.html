<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Extrato</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div id="appName">Meu Banco</div>
      </div>
      <button id="eyeBtn" class="btnIcon">👁</button>
    </div>

    <div class="nav">
      <a class="navlink" data-page="home" href="./index.html">Home</a>
      <a class="navlink" data-page="extrato" href="./extrato.html">Extrato</a>
      <a class="navlink" data-page="pix" href="./pix.html">Pix</a>
      <a class="navlink" data-page="metas" href="./metas.html">Metas</a>
      <a class="navlink" data-page="cartoes" href="./cartoes.html">Cartões</a>
      <a class="navlink" data-page="config" href="./config.html">Config</a>
      <a class="navlink" data-page="admin" href="./admin.html">Admin</a>
    </div>

    <div class="card">
      <div class="cardHeader">
        <div style="font-weight:900;">Extrato</div>
        <div class="pill"><span id="timeText"></span></div>
      </div>

      <div class="cardBody">
        <div class="grid2">
          <div>
            <label class="muted">Buscar</label>
            <input id="q" placeholder="pix, mercado, ifood..." />
          </div>
          <div>
            <label class="muted">Mês (YYYY-MM)</label>
            <select id="mes"></select>
          </div>
          <div>
            <label class="muted">Tipo</label>
            <select id="tipo">
              <option value="">Todos</option>
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
            </select>
          </div>
          <div>
            <label class="muted">Categoria</label>
            <select id="cat"></select>
          </div>
        </div>

        <hr class="sep"/>

        <div class="row">
          <div class="pill">Entradas: <b id="totalIn">R$ 0,00</b></div>
          <div class="pill">Saídas: <b id="totalOut">R$ 0,00</b></div>
        </div>

        <div style="margin-top:14px;">
          <div class="muted" style="margin-bottom:8px;">Gastos por categoria</div>
          <canvas id="chart" style="width:100%;height:220px;"></canvas>
        </div>

        <hr class="sep"/>

        <table class="table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Valor</th>
            </tr>
          </thead>
          <tbody id="extratoList"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="./js/charts.js"></script>
  <script src="./js/app.js"></script>
  <script>
    App.init("extrato");
  </script>
</body>
</html>
