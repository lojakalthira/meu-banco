<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Extrato</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div id="appName">Meu Banco</div>
      </div>
      <button id="eyeBtn" class="btnIcon">👁</button>
    </div>

    <div class="nav">
      <a class="navlink" data-page="home" href="./index.html">Home</a>
      <a class="navlink" data-page="extrato" href="./extrato.html">Extrato</a>
      <a class="navlink" data-page="pix" href="./pix.html">Pix</a>
      <a class="navlink" data-page="metas" href="./metas.html">Metas</a>
      <a class="navlink" data-page="cartoes" href="./cartoes.html">Cartões</a>
      <a class="navlink" data-page="config" href="./config.html">Config</a>
      <a class="navlink" data-page="admin" href="./admin.html">Admin</a>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Filtros</div>
          <div class="pill"><span id="timeText"></span></div>
        </div>
        <div class="cardBody">
          <div class="field">
            <label>Busca</label>
            <input id="q" placeholder="pix, mercado, ifood...">
          </div>

          <div class="grid2" style="margin-top:12px;">
            <div class="field">
              <label>Mês</label>
              <select id="mes"></select>
            </div>
            <div class="field">
              <label>Tipo</label>
              <select id="tipo">
                <option value="">Todos</option>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
              </select>
            </div>
          </div>

          <div class="field" style="margin-top:12px;">
            <label>Categoria</label>
            <select id="cat"></select>
          </div>

          <div class="sep"></div>

          <div class="row">
            <div class="pill">⬆️ Entradas: <b id="totalIn"></b></div>
            <div class="pill">⬇️ Saídas: <b id="totalOut"></b></div>
          </div>

          <div class="sep"></div>

          <div class="muted">Gastos por categoria</div>
          <canvas id="chart" style="width:100%;height:260px;margin-top:10px;"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Extrato</div>
          <div class="muted">salva no navegador</div>
        </div>
        <div class="cardBody">
          <table class="table">
            <thead>
              <tr><th>Data</th><th>Título</th><th>Categoria</th><th>Valor</th></tr>
            </thead>
            <tbody id="extratoList"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="./js/charts.js"></script>
  <script src="./js/app.js"></script>
  <script>App.init("extrato");</script>
</body>
</html>
