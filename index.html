<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div id="appName">Meu Banco</div>
      </div>
      <button id="eyeBtn" class="btnIcon" title="Esconder valores (P)">👁</button>
    </div>

    <div class="nav">
      <a class="navlink" data-page="home" href="./index.html">Home</a>
      <a class="navlink" data-page="extrato" href="./extrato.html">Extrato</a>
      <a class="navlink" data-page="pix" href="./pix.html">Pix</a>
      <a class="navlink" data-page="metas" href="./metas.html">Metas</a>
      <a class="navlink" data-page="cartoes" href="./cartoes.html">Cartões</a>
      <a class="navlink" data-page="config" href="./config.html">Config</a>
      <a class="navlink" data-page="admin" href="./admin.html">Admin</a>
    </div>

    <div class="card">
      <div class="cardHeader">
        <div class="row" style="justify-content:flex-start;gap:10px;">
          <div class="pill">👤 <span id="userName">Usuário</span></div>
        </div>
        <div class="pill"><span id="timeText"></span></div>
      </div>

      <div class="cardBody">
        <div class="muted">Saldo disponível</div>
        <div class="money" id="saldoText">R$ 0,00</div>

        <div class="row" style="margin-top:10px;">
          <div class="pill" style="border-style:solid;">Limite: <b id="limiteText">R$ 0,00</b></div>
          <div class="muted">Tecla <b>P</b> ou 👁</div>
        </div>

        <div class="actions">
          <div class="action" onclick="location.href='./pix.html#enviar'">
            <div class="k">Ação</div>
            <div class="v">Pix</div>
          </div>

          <div class="action" onclick="location.href='./extrato.html'">
            <div class="k">Ação</div>
            <div class="v">Extrato</div>
          </div>

          <div class="action" onclick="location.href='./metas.html'">
            <div class="k">Ação</div>
            <div class="v">Metas</div>
          </div>

          <div class="action" onclick="location.href='./cartoes.html'">
            <div class="k">Ação</div>
            <div class="v">Cartões</div>
          </div>
        </div>

        <div class="sep"></div>

        <div class="muted">
        </div>
      </div>
    </div>

  </div>

  <script src="./js/app.js"></script>
  <script>App.init("home");</script>
</body>
</html>
