<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Config</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div id="appName">Meu Banco</div>
      </div>
      <button id="eyeBtn" class="btnIcon">👁</button>
    </div>

    <div class="nav">
      <a class="navlink" data-page="home" href="./index.html">Home</a>
      <a class="navlink" data-page="extrato" href="./extrato.html">Extrato</a>
      <a class="navlink" data-page="pix" href="./pix.html">Pix</a>
      <a class="navlink" data-page="metas" href="./metas.html">Metas</a>
      <a class="navlink" data-page="cartoes" href="./cartoes.html">Cartões</a>
      <a class="navlink" data-page="config" href="./config.html">Config</a>
      <a class="navlink" data-page="admin" href="./admin.html">Admin</a>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Tema</div>
          <div class="pill">Atual: <b id="themeNow"></b></div>
        </div>
        <div class="cardBody">
          <div class="row" style="justify-content:flex-start;gap:10px;">
            <button class="btn" data-theme="roxo">Roxo</button>
            <button class="btn" data-theme="azul">Azul</button>
            <button class="btn" data-theme="neon">Neon</button>
          </div>
          <div class="muted" style="margin-top:10px;">Tema fica salvo no navegador.</div>
        </div>
      </div>

      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Backup</div>
          <div class="muted">exportar/importar</div>
        </div>
        <div class="cardBody">
          <div class="row" style="justify-content:flex-start;gap:10px;">
            <button class="btn primary" id="btnExport">Exportar JSON</button>
            <button class="btn" id="btnReset">Resetar para padrão</button>
          </div>

          <div class="sep"></div>

          <div class="field">
            <label>Importar backup (.json)</label>
            <input id="importFile" type="file" accept="application/json">
          </div>
          <button class="btn primary" id="btnImport" style="margin-top:10px;">Importar</button>

          <div class="muted" style="margin-top:10px;">
            Se você importar, o app substitui tudo pelo arquivo.
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="./js/app.js"></script>
  <script>App.init("config");</script>
</body>
</html>
