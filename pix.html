<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pix</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div id="appName">Meu Banco</div>
      </div>
      <button id="eyeBtn" class="btnIcon">👁</button>
    </div>

    <div class="nav">
      <a class="navlink" data-page="home" href="./index.html">Home</a>
      <a class="navlink" data-page="extrato" href="./extrato.html">Extrato</a>
      <a class="navlink" data-page="pix" href="./pix.html">Pix</a>
      <a class="navlink" data-page="metas" href="./metas.html">Metas</a>
      <a class="navlink" data-page="cartoes" href="./cartoes.html">Cartões</a>
      <a class="navlink" data-page="config" href="./config.html">Config</a>
      <a class="navlink" data-page="admin" href="./admin.html">Admin</a>
    </div>

    <div class="grid2">

      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Enviar Pix</div>
          <div class="pill"><span id="timeText"></span></div>
        </div>
        <div class="cardBody">

          <!-- STEP 1 -->
          <div id="pixStep1">
            <div class="field">
              <label>Nome, CPF/CNPJ ou Chave Pix</label>
              <input id="pixDest" placeholder="Nome • CPF • chave@email.com">
            </div>

            <div class="field" style="margin-top:12px;">
              <label>Valor</label>
              <input id="pixValor" inputmode="decimal" placeholder="50,00">
            </div>

            <div style="margin-top:12px;">
              <div class="muted" style="margin-bottom:8px;">De onde vai sair?</div>
              <div class="segmented">
                <button class="segBtn active" id="srcConta" type="button">Conta</button>
                <button class="segBtn" id="srcCartao" type="button">Cartão</button>
              </div>
              <div class="muted" style="margin-top:10px;" id="srcHint"></div>
            </div>

            <div class="row" style="margin-top:14px;">
              <button class="btn" type="button" onclick="location.href='./index.html'">Voltar</button>
              <button class="btn primary" id="btnEnviar" type="button">Enviar</button>
            </div>
          </div>

          <!-- STEP 2 -->
          <div id="pixStep2" style="display:none;">
            <div class="center">
              <div class="spinner"></div>
              <div style="font-weight:900;margin-top:12px;">Enviando Pix...</div>
              <button class="btn" id="btnVoltar2" style="margin-top:16px;">Voltar</button>
            </div>
          </div>

          <!-- STEP 3 -->
          <div id="pixStep3" style="display:none;">
            <div class="center">
              <div style="font-size:44px;"></div>
              <div style="font-weight:900;margin-top:10px;">Pix enviado!</div>
              <div class="muted" id="pixResumo" style="margin-top:8px;"></div>

              <div class="row" style="margin-top:16px;justify-content:center;">
                <button class="btn" id="btnComprovante">Gerar comprovante (PDF)</button>
              </div>

              <div class="row" style="margin-top:12px;">
                <button class="btn" id="btnVoltar3">Voltar</button>
                <button class="btn primary" onclick="location.href='./index.html'">Voltar pra Home</button>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Histórico + Chaves</div>
          <button class="btnIcon" id="btnSimRecebido" title="Simular Pix recebido">⬇️</button>
        </div>
        <div class="cardBody">

          <div class="muted" style="margin-bottom:10px;">Histórico</div>
          <table class="table">
            <thead>
              <tr><th>Data</th><th>Nome</th><th>Detalhe</th><th>Valor</th></tr>
            </thead>
            <tbody id="pixHist"></tbody>
          </table>

          <hr class="sep">

          <div class="muted" style="margin-bottom:10px;">Minhas chaves</div>
          <div class="row" style="gap:10px;justify-content:flex-start;">
            <input id="pixKey" placeholder="Adicionar chave (email/telefone/CPF)">
            <button class="btn primary" id="btnAddKey">Adicionar</button>
          </div>

          <div style="margin-top:12px;" id="pixChaves"></div>

        </div>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="./js/app.js"></script>
  <script>App.init("pix");</script>
</body>
</html>
