<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enviar Pix</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div id="appName">Meu Banco</div>
      </div>
      <button id="eyeBtn" class="btnIcon" title="Privacidade (P)">👁</button>
    </div>

    <div class="nav">
      <a class="navlink" data-page="home" href="./index.html">Home</a>
      <a class="navlink" data-page="extrato" href="./extrato.html">Extrato</a>
      <a class="navlink" data-page="pix" href="./pix.html">Pix</a>
      <a class="navlink" data-page="metas" href="./metas.html">Metas</a>
      <a class="navlink" data-page="cartoes" href="./cartoes.html">Cartões</a>
      <a class="navlink" data-page="config" href="./config.html">Config</a>
      <a class="navlink" data-page="admin" href="./admin.html">Admin</a>
    </div>

    <div class="card">
      <div class="cardHeader">
        <div style="font-weight:900;">Enviar Pix</div>
        <div class="pill"><span id="timeText"></span></div>
      </div>

      <div class="cardBody">

        <!-- TELA 1: FORM -->
        <div id="stepForm">
          <div class="grid2">
            <div>
              <label class="muted">Nome</label>
              <input id="pNome" placeholder="Ex: Maria Silva" />
            </div>
            <div>
              <label class="muted">CPF/CNPJ ou Chave Pix</label>
              <input id="pChave" placeholder="Ex: CPF, telefone, e-mail..." />
            </div>
            <div>
              <label class="muted">Valor (R$)</label>
              <input id="pValor" inputmode="decimal" placeholder="Ex: 50,00" />
            </div>
            <div>
              <label class="muted">De onde sai o dinheiro</label>
              <div class="row" style="gap:10px;">
                <button class="btn" id="srcConta" type="button">Conta</button>
                <button class="btn" id="srcCartao" type="button">Cartão</button>
              </div>

              <div id="cartaoBox" style="display:none;margin-top:10px;">
                <label class="muted">Escolha o cartão</label>
                <select id="cartaoSelect"></select>
              </div>
            </div>
          </div>

          <hr class="sep"/>

          <div class="row" style="gap:10px;">
            <button class="btn" id="backToHome" type="button">Voltar</button>
            <button class="btn primary" id="sendBtn" type="button">Enviar</button>
          </div>

          <div class="muted" style="margin-top:10px;">
            Obs: Esse Pix é visual (pra persistir no GitHub, use o Admin e gere o banco.json).
          </div>
        </div>

        <!-- TELA 2: LOADING -->
        <div id="stepLoading" style="display:none;">
          <div style="display:grid;gap:10px;justify-items:center;padding:26px 0;">
            <div style="font-weight:900;font-size:18px;">Enviando…</div>
            <div class="pill">Aguarde um instante</div>
            <div style="opacity:.75">⏳</div>
          </div>
          <div class="row" style="gap:10px;">
            <button class="btn" id="backToForm" type="button">Voltar</button>
          </div>
        </div>

        <!-- TELA 3: SUCESSO -->
        <div id="stepDone" style="display:none;">
          <div style="display:grid;gap:10px;justify-items:center;padding:26px 0;">
            <div style="font-weight:900;font-size:20px;">Enviado ✅</div>
            <div class="muted" id="doneInfo"></div>
          </div>

          <div class="row" style="gap:10px;">
            <button class="btn primary" id="receiptBtn" type="button">Gerar comprovante</button>
            <button class="btn" id="doneToHome" type="button">Voltar para Home</button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="./js/app.js"></script>
  <script>
    App.init("pix_enviar");
  </script>
</body>
</html>
