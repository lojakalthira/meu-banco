<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div id="appName">Meu Banco</div>
      </div>
      <button id="eyeBtn" class="btnIcon">👁</button>
    </div>

    <div class="nav">
      <a class="navlink" data-page="home" href="./index.html">Home</a>
      <a class="navlink" data-page="extrato" href="./extrato.html">Extrato</a>
      <a class="navlink" data-page="pix" href="./pix.html">Pix</a>
      <a class="navlink" data-page="metas" href="./metas.html">Metas</a>
      <a class="navlink" data-page="cartoes" href="./cartoes.html">Cartões</a>
      <a class="navlink" data-page="config" href="./config.html">Config</a>
      <a class="navlink" data-page="admin" href="./admin.html">Admin</a>
    </div>

    <div class="grid2">

      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Editar dados principais</div>
          <div class="pill"><span id="timeText"></span></div>
        </div>
        <div class="cardBody">

          <div class="grid2">
            <div class="field">
              <label>Nome do usuário</label>
              <input id="nome">
            </div>
            <div class="field">
              <label>Nome do app</label>
              <input id="app">
            </div>
            <div class="field">
              <label>Saldo</label>
              <input id="saldo" inputmode="decimal">
            </div>
            <div class="field">
              <label>Limite</label>
              <input id="limite" inputmode="decimal">
            </div>
          </div>

          <div class="row" style="margin-top:12px;">
            <button class="btn primary" id="btnSaveMain">Salvar</button>
            <span class="muted">Salva no navegador</span>
          </div>

        </div>
      </div>

      <div class="card">
        <div class="cardHeader">
          <div style="font-weight:900;">Adicionar coisas rápido</div>
          <div class="muted">tudo salva</div>
        </div>
        <div class="cardBody">

          <div class="card" style="margin-bottom:14px;">
            <div class="cardBody">
              <div style="font-weight:900;margin-bottom:10px;">Extrato</div>
              <div class="grid2">
                <div class="field">
                  <label>Data (YYYY-MM-DD)</label>
                  <input id="tData" placeholder="2026-03-03">
                </div>
                <div class="field">
                  <label>Tipo</label>
                  <select id="tTipo">
                    <option value="saida">Saída</option>
                    <option value="entrada">Entrada</option>
                  </select>
                </div>
                <div class="field">
                  <label>Título</label>
                  <input id="tTitulo" placeholder="Mercado">
                </div>
                <div class="field">
                  <label>Categoria</label>
                  <input id="tCat" placeholder="Alimentação">
                </div>
                <div class="field" style="grid-column:1/-1;">
                  <label>Valor</label>
                  <input id="tValor" inputmode="decimal" placeholder="53,90">
                </div>
              </div>
              <button class="btn primary" id="btnAddTrans" style="margin-top:10px;">Adicionar</button>

              <table class="table" style="margin-top:12px;">
                <thead><tr><th>Data</th><th>Título</th><th>Categoria</th><th>Valor</th></tr></thead>
                <tbody id="prevTrans"></tbody>
              </table>
            </div>
          </div>

          <div class="card" style="margin-bottom:14px;">
            <div class="cardBody">
              <div style="font-weight:900;margin-bottom:10px;">Metas</div>
              <div class="grid2">
                <div class="field">
                  <label>Nome</label>
                  <input id="mNome" placeholder="Meta: algo">
                </div>
                <div class="field">
                  <label>Meta</label>
                  <input id="mMeta" inputmode="decimal" placeholder="3000,00">
                </div>
                <div class="field" style="grid-column:1/-1;">
                  <label>Atual</label>
                  <input id="mAtual" inputmode="decimal" placeholder="0,00">
                </div>
              </div>
              <button class="btn primary" id="btnAddMeta" style="margin-top:10px;">Adicionar</button>

              <table class="table" style="margin-top:12px;">
                <thead><tr><th>Nome</th><th>Atual</th><th>Meta</th><th></th></tr></thead>
                <tbody id="prevMetas"></tbody>
              </table>
            </div>
          </div>

          <div class="card" style="margin-bottom:14px;">
            <div class="cardBody">
              <div style="font-weight:900;margin-bottom:10px;">Chave Pix</div>
              <div class="row" style="justify-content:flex-start;gap:10px;">
                <input id="pixKey" placeholder="email/telefone/CPF">
                <button class="btn primary" id="btnAddKey">Adicionar</button>
              </div>
              <div style="margin-top:10px;" id="prevKeys"></div>
            </div>
          </div>

          <div class="card">
            <div class="cardBody">
              <div style="font-weight:900;margin-bottom:10px;">Cartão</div>
              <div class="grid2">
                <div class="field">
                  <label>Nome</label>
                  <input id="cNome" placeholder="Cartão Virtual">
                </div>
                <div class="field">
                  <label>Bandeira</label>
                  <select id="cBand">
                    <option>VISA</option>
                    <option>MASTERCARD</option>
                    <option>ELO</option>
                    <option>AMEX</option>
                  </select>
                </div>
                <div class="field">
                  <label>Final (4 dígitos)</label>
                  <input id="cFinal" inputmode="numeric" maxlength="4" placeholder="4832">
                </div>
                <div class="field">
                  <label>Vencimento (dia)</label>
                  <input id="cVenc" inputmode="numeric" placeholder="10">
                </div>
                <div class="field">
                  <label>Limite</label>
                  <input id="cLimite" inputmode="decimal" placeholder="1200,00">
                </div>
                <div class="field">
                  <label>Fatura</label>
                  <input id="cFatura" inputmode="decimal" placeholder="0,00">
                </div>
              </div>
              <button class="btn primary" id="btnAddCard" style="margin-top:10px;">Adicionar</button>

              <table class="table" style="margin-top:12px;">
                <thead><tr><th>Nome</th><th>Final</th><th>Status</th><th></th></tr></thead>
                <tbody id="prevCards"></tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

    </div>

  </div>

  <script src="./js/app.js"></script>
  <script>App.init("admin");</script>
</body>
</html>
